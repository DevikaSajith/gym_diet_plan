{% extends 'diet_app/base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto;">
    <h1 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div style="margin-bottom: 1.5rem;">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: #fca5a5; font-size: 0.85rem; margin-top: 0.25rem;">
                        {{ field.errors|striptags }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn" style="width: 100%;">Log In</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary);">Sign Up</a>
    </p>
</div>
{% endblock %}
