{% extends 'base.html' %}
{% block content %}
    <!-- slider_area_start -->
    <div class="bradcam_area">
            <div class="single_bradcam  d-flex align-items-center bradcam_bg_1 overlay" style="height: 200px;">
                    <div class="container">
                        <div class="row align-items-center justify-content-center">
                            <div class="col-xl-9">
                                <div class="bradcam_text text-center">
                                    <h4>Login</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
    </div>
    <!-- slider_area_end -->


    <div class="container pb-5">
        <form method="post">
        {% csrf_token %}

            <div class="row justify-content-md-center">
                <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12 col-12">
                    <div class="login-screen">
                        <div class="login-box">
                            <!-- Your input fields -->
                            <h4 class="text-center text-black mb-4">LOGIN</h4>
                            
                            <!-- Messages Display -->
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>
                                {% endfor %}
                                <script>
                                    setTimeout(function() {
                                        var alerts = document.querySelectorAll('.alert');
                                        for (var i = 0; i < alerts.length; i++) {
                                            alerts[i].style.display = 'none';
                                        }
                                    }, 5000);
                                </script>
                            {% endif %}
                        
                            <div class="form-group">
                                <input type="email" class="form-control" name="log_email" placeholder="Email ID">
                            </div>
                            <div class="form-group">
                                <input type="password" class="form-control" name="log_password" placeholder="Password">
                            </div>

                            <div class="actions clearfix text-center"> <!-- Center the button -->
                                <button type="submit" class="btn btn-primary btn-sm">LOGIN</button> <!-- Small login button -->
                            </div>

                            <div class="text-center mb-3">
                                <a href="/registration" class="additional-link">Not Have an Account? <span>Register Now</span></a>
                                <br>
                                <a href="/nutritionreg" class="additional-link">Nutritionist? <span>Register Here</span></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
{% endblock %}
