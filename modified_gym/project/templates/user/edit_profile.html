{% extends 'base.html' %}
{% load static %}
{% block content %}
    <!-- bradcam_area_start -->
    <div class="bradcam_area">
            <div class="single_bradcam  d-flex align-items-center bradcam_bg_1 overlay" style="height: 200px;">
                    <div class="container">
                        <div class="row align-items-center justify-content-center">
                            <div class="col-xl-9">
                                <div class="bradcam_text text-center">
                                    <h4>Edit Profile</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
    </div>
    <!-- bradcam_area_end -->

<div class="container pb-5 mt-5">
    <form action="#" method="POST">
        {% csrf_token %}
        <div class="row justify-content-md-center">
            <div class="col-xl-6 col-lg-8 col-md-10 col-sm-12 col-12">
                <div class="login-screen" style="background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                    <div class="login-box">
                        <h4 class="text-center text-black mb-4" style="font-family: 'Teko', sans-serif; font-size: 32px; letter-spacing: 2px;">UPDATE YOUR INFORMATION</h4>
                        
                        <!-- Messages Display -->
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                        <span aria-hidden="true">&times;</span>
                                    </button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="text-black">Full Name</label>
                                    <input type="text" class="form-control" name="name" value="{{ user.name }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="text-black">Phone Number</label>
                                    <input type="text" class="form-control" name="phone" value="{{ user.phone }}" pattern="[0-9]{10}" minlength="10" maxlength="10" required>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="text-black">Age</label>
                                    <input type="number" class="form-control" name="age" value="{{ user.age }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="text-black">Gender</label>
                                    <select class="form-control" name="gender" required>
                                        <option value="Male" {% if user.gender == 'Male' %}selected{% endif %}>Male</option>
                                        <option value="Female" {% if user.gender == 'Female' %}selected{% endif %}>Female</option>
                                        <option value="Other" {% if user.gender == 'Other' %}selected{% endif %}>Other</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="text-black">Height (cm)</label>
                                    <input type="number" step="0.1" class="form-control" name="height" value="{{ user.height }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="text-black">Weight (kg)</label>
                                    <input type="number" step="0.1" class="form-control" name="weight" value="{{ user.weight }}" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="text-black">Health Goal</label>
                            <select class="form-control" name="health_goal" required>
                                <option value="Weight Loss" {% if user.health_goal == 'Weight Loss' %}selected{% endif %}>Weight Loss</option>
                                <option value="Muscle Gain" {% if user.health_goal == 'Muscle Gain' %}selected{% endif %}>Muscle Gain</option>
                                <option value="Maintenance" {% if user.health_goal == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                            </select>
                        </div>

                        <div class="actions clearfix text-center mt-4">
                            <button type="submit" class="boxed-btn3" style="width: 100%;">SAVE CHANGES</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
