{% extends 'admin/adminbase.html' %}
{% load static %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0 text-white">Set Subscription Amount</h4>
                </div>
                <div class="card-body">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="amount">Chat Subscription Amount (₹)</label>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ settings.amount|default:0 }}" required>
                            <small class="form-text text-muted">This amount will be charged to users to unlock chat for their diet plans.</small>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block mt-4" style="background: #F7444E; border: none; height: 50px;">Set Amount</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
